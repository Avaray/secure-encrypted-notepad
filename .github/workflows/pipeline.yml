name: Test & Release

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (leave empty to use Cargo.toml version)'
        required: false
        type: string
      build_android:
        description: 'Build Android AAB'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------------------------------
  # 1. CHECK TAG JOB — lightweight, no toolchains installed
  #    Reads version from Cargo.toml with grep, checks git remote for tag.
  #    Skipped entirely on Pull Requests (PRs go straight to tests).
  # --------------------------------------------------------------------------
  check-tag:
    name: Check Tag
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_new: ${{ steps.check.outputs.is_new }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using manually provided version: $VERSION"
          else
            VERSION=$(grep -m 1 '^version' crates/sen-desktop/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
            echo "Detected version from sen-desktop/Cargo.toml: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --exit-code --tags origin "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.get_version.outputs.version }} already exists. Skipping release."
            echo "is_new=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v${{ steps.get_version.outputs.version }} does not exist. Proceeding with release."
            echo "is_new=true" >> $GITHUB_OUTPUT
          fi

  # --------------------------------------------------------------------------
  # 2. TEST JOB
  #    - On PRs: always runs (no dependency on check-tag).
  #    - On push to main / workflow_dispatch: runs only when a new version
  #      tag is detected (avoids wasting CI minutes on repeated pushes
  #      with the same version).
  # --------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os-name }})
    needs: check-tag
    # Run when: (a) it's a PR, or (b) check-tag found a new version
    if: >-
      always() && (
        github.event_name == 'pull_request' ||
        needs.check-tag.outputs.is_new == 'true'
      )
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            target: x86_64-pc-windows-msvc

          - os: ubuntu-latest
            os-name: Linux
            target: x86_64-unknown-linux-gnu

          - os: macos-latest
            os-name: macOS
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check I18n Translations
        run: bun scripts/locales-sync.ts --dry-run

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: ${{ matrix.target }}

      # Composite action defined in .github/actions/linux-deps/action.yml
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/linux-deps

      - name: Clippy
        run: cargo clippy --locked --target ${{ matrix.target }}

      - name: Run Tests
        run: cargo test --locked --target ${{ matrix.target }} --verbose

  # --------------------------------------------------------------------------
  # 3. BUILD DESKTOP JOB — Build release binaries
  #    Uses the custom "release-final" Cargo profile defined in the root
  #    Cargo.toml — it inherits from "release" with additional optimizations
  #    (e.g. LTO, codegen-units = 1, strip = true).
  # --------------------------------------------------------------------------
  build-desktop:
    name: Build (${{ matrix.os-name }})
    needs: [check-tag, test]
    if: needs.check-tag.outputs.is_new == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            target: x86_64-pc-windows-msvc
            binary: sen.exe
            artifact: sen-v${{ needs.check-tag.outputs.version }}-windows.exe

          - os: ubuntu-latest
            os-name: Linux
            target: x86_64-unknown-linux-gnu
            binary: sen
            artifact: sen-v${{ needs.check-tag.outputs.version }}-linux

          - os: macos-latest
            os-name: macOS Intel
            target: x86_64-apple-darwin
            binary: sen
            artifact: sen-v${{ needs.check-tag.outputs.version }}-macos

          - os: macos-latest
            os-name: macOS ARM64
            target: aarch64-apple-darwin
            binary: sen
            artifact: sen-v${{ needs.check-tag.outputs.version }}-macos-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: ${{ matrix.target }}
          cache-targets: false

      # Composite action defined in .github/actions/linux-deps/action.yml
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/linux-deps

      - name: Build Release Binary
        run: cargo build --locked --profile release-final --target ${{ matrix.target }}

      - name: Rename Binary
        run: mv target/${{ matrix.target }}/release-final/${{ matrix.binary }} target/${{ matrix.target }}/release-final/${{ matrix.artifact }}
        shell: bash

      - name: Generate Checksum
        run: |
          cd target/${{ matrix.target }}/release-final
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release-final/${{ matrix.artifact }}
            target/${{ matrix.target }}/release-final/${{ matrix.artifact }}.sha256
          retention-days: 7

  # --------------------------------------------------------------------------
  # 4. BUILD ANDROID JOB
  #    Intentionally manual-only (build_android input) — Android target is
  #    in early development and not yet part of the automatic release flow.
  #
  #    Produces a signed .aab (Android App Bundle) required by Google Play.
  #    Unsigned builds are rejected by the Play Store.
  #
  #    Required secrets:
  #      KEYSTORE_BASE64      — base64-encoded .jks keystore file
  #                             generate with: base64 -w 0 release.jks
  #      KEYSTORE_PASSWORD    — password set when creating the keystore
  #      KEY_ALIAS            — alias chosen when creating the key
  #      KEY_PASSWORD         — key password (often same as KEYSTORE_PASSWORD)
  #
  #    How to create a keystore (one-time, keep the .jks file safe!):
  #      keytool -genkeypair -v \
  #        -keystore release.jks \
  #        -alias sen-release \
  #        -keyalg RSA -keysize 4096 \
  #        -validity 10000
  #
  #    NDK cache: ~1.5 GB. GitHub gives 10 GB cache per repo — well within limit.
  # --------------------------------------------------------------------------
  build-android:
    name: Build (Android)
    needs: [check-tag, test]
    if: needs.check-tag.outputs.is_new == 'true' && github.event.inputs.build_android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      # No NDK cache needed — ubuntu-latest runners ship with Android SDK and
      # NDK pre-installed. cargo-ndk detects them via ANDROID_NDK_ROOT automatically.
      # No Gradle cache either — this job is manual-only and runs rarely, so any
      # cached entries would expire (7-day TTL) before the next run anyway.

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: android

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-ndk
        run: cargo binstall -y cargo-ndk

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # Decode the keystore stored as a base64 secret and write it to disk.
      # The file is used by Gradle's signingConfig in app/build.gradle.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > crates/sen-android/android/app/release.jks

      - name: Build AAB (Release, signed)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd crates/sen-android/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Locate and rename AAB
        run: |
          AAB_PATH=$(find crates/sen-android/android/app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          if [ -n "$AAB_PATH" ]; then
            cp "$AAB_PATH" "sen-v${{ needs.check-tag.outputs.version }}-android.aab"
          else
            echo "No AAB found!"
            exit 1
          fi
        shell: bash

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: sen-v${{ needs.check-tag.outputs.version }}-android.aab
          retention-days: 7

  # --------------------------------------------------------------------------
  # 5. CREATE RELEASE JOB
  #    Note: no checkout needed here — softprops/action-gh-release communicates
  #    entirely via the GitHub API using the token. The release notes are also
  #    generated server-side by GitHub, so no local repo access is required.
  # --------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: [check-tag, build-desktop, build-android]
    if: >-
      always() && 
      needs.check-tag.outputs.is_new == 'true' && 
      needs.build-desktop.result == 'success' && 
      (needs.build-android.result == 'success' || needs.build-android.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_files
          pattern: '*'
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-tag.outputs.version }}
          name: v${{ needs.check-tag.outputs.version }}
          files: release_files/*
          generate_release_notes: true
          draft: false
          prerelease: false
          token: ${{ secrets.RELEASE_PAT }}
