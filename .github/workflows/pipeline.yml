name: Test & Release

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (leave empty to use Cargo.toml version)'
        required: false
        type: string
      build_android:
        description: 'Build Android APK'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------------------------------
  # 1. CHECK TAG JOB — lightweight, no toolchains installed
  #    Reads version from Cargo.toml with grep, checks git remote for tag.
  #    Skipped entirely on Pull Requests (PRs go straight to tests).
  # --------------------------------------------------------------------------
  check-tag:
    name: Check Tag
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_new: ${{ steps.check.outputs.is_new }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using manually provided version: $VERSION"
          else
            VERSION=$(grep -m 1 '^version' crates/sen-desktop/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
            echo "Detected version from sen-desktop/Cargo.toml: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --exit-code --tags origin "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.get_version.outputs.version }} already exists. Skipping release."
            echo "is_new=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v${{ steps.get_version.outputs.version }} does not exist. Proceeding with release."
            echo "is_new=true" >> $GITHUB_OUTPUT
          fi

  # --------------------------------------------------------------------------
  # 2. TEST JOB
  #    - On PRs: always runs (no dependency on check-tag).
  #    - On push to main / workflow_dispatch: runs only when a new version
  #      tag is detected (avoids wasting CI minutes on repeated pushes
  #      with the same version).
  # --------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os-name }})
    needs: check-tag
    # Run when: (a) it's a PR, or (b) check-tag found a new version
    if: >-
      always() && (
        github.event_name == 'pull_request' ||
        needs.check-tag.outputs.is_new == 'true'
      )
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            target: x86_64-pc-windows-msvc

          - os: ubuntu-latest
            os-name: Linux
            target: x86_64-unknown-linux-gnu

          - os: macos-latest
            os-name: macOS
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check I18n Translations
        run: bun scripts/locales-sync.ts --dry-run

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Clippy
        run: cargo clippy --locked --target ${{ matrix.target }}

      - name: Run Tests
        run: cargo test --locked --target ${{ matrix.target }} --verbose

  # --------------------------------------------------------------------------
  # 3. BUILD DESKTOP JOB — Build release binaries
  # --------------------------------------------------------------------------
  build-desktop:
    name: Build (${{ matrix.os-name }})
    needs: [check-tag, test]
    if: needs.check-tag.outputs.is_new == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            target: x86_64-pc-windows-msvc
            binary: sen.exe
            artifact: sen-v${{ needs.check-tag.outputs.version }}-windows.exe

          - os: ubuntu-latest
            os-name: Linux
            target: x86_64-unknown-linux-gnu
            binary: sen
            artifact: sen-v${{ needs.check-tag.outputs.version }}-linux

          - os: macos-latest
            os-name: macOS Intel
            target: x86_64-apple-darwin
            binary: sen
            artifact: sen-v${{ needs.check-tag.outputs.version }}-macos

          - os: macos-latest
            os-name: macOS ARM64
            target: aarch64-apple-darwin
            binary: sen
            artifact: sen-v${{ needs.check-tag.outputs.version }}-macos-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: ${{ matrix.target }}
          cache-targets: false

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Build Release Binary
        run: cargo build --locked --profile release-final --target ${{ matrix.target }}

      - name: Rename Binary
        run: mv target/${{ matrix.target }}/release-final/${{ matrix.binary }} target/${{ matrix.target }}/release-final/${{ matrix.artifact }}
        shell: bash

      - name: Generate Checksum
        run: |
          cd target/${{ matrix.target }}/release-final
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release-final/${{ matrix.artifact }}
            target/${{ matrix.target }}/release-final/${{ matrix.artifact }}.sha256
          retention-days: 7

  # --------------------------------------------------------------------------
  # 4. BUILD ANDROID JOB
  # --------------------------------------------------------------------------
  build-android:
    name: Build (Android)
    needs: [check-tag, test]
    if: needs.check-tag.outputs.is_new == 'true' && github.event.inputs.build_android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-ndk
        run: cargo binstall -y cargo-ndk

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build APK (Release)
        run: |
          cd crates/sen-android/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          APK_PATH=$(find crates/sen-android/android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "sen-v${{ needs.check-tag.outputs.version }}-android-unsigned.apk"
          else
            echo "No APK found!"
            exit 1
          fi
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: sen-v${{ needs.check-tag.outputs.version }}-android-unsigned.apk
          retention-days: 7

  # --------------------------------------------------------------------------
  # 5. CREATE RELEASE JOB
  # --------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: [check-tag, build-desktop, build-android]
    if: >-
      always() && 
      needs.check-tag.outputs.is_new == 'true' && 
      needs.build-desktop.result == 'success' && 
      (needs.build-android.result == 'success' || needs.build-android.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_files
          pattern: '*'
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-tag.outputs.version }}
          name: v${{ needs.check-tag.outputs.version }}
          files: release_files/*
          generate_release_notes: true
          draft: false
          prerelease: false
          token: ${{ secrets.RELEASE_PAT }}