name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string
      build_android:
        description: 'Build Android APK'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Check Version & Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      created: ${{ steps.check_tag.outputs.created }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sync I18n Translations
        run: bun scripts/locales-sync.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using manually provided version: $VERSION"
          else
            VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
            echo "Detected version from Cargo.toml: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --exit-code --tags origin "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.get_version.outputs.version }} already exists. Skipping release."
            echo "created=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v${{ steps.get_version.outputs.version }} does not exist. Proceeding with release."
            echo "created=true" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build (${{ matrix.os-name }})
    needs: check-version
    if: needs.check-version.outputs.created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            target: x86_64-pc-windows-msvc
            binary: sen.exe
            artifact: sen-v${{ needs.check-version.outputs.version }}-windows.exe

          - os: ubuntu-latest
            os-name: Linux
            target: x86_64-unknown-linux-gnu
            binary: sen
            artifact: sen-v${{ needs.check-version.outputs.version }}-linux

          - os: macos-latest
            os-name: macOS
            target: x86_64-apple-darwin
            binary: sen
            artifact: sen-v${{ needs.check-version.outputs.version }}-macos

          - os: macos-latest
            os-name: macOS ARM64
            target: aarch64-apple-darwin
            binary: sen
            artifact: sen-v${{ needs.check-version.outputs.version }}-macos-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: ${{ matrix.target }}
          cache-targets: false

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Build Release Binary
        run: cargo build --profile release-final --target ${{ matrix.target }}

      - name: Rename Binary
        run: mv target/${{ matrix.target }}/release-final/${{ matrix.binary }} target/${{ matrix.target }}/release-final/${{ matrix.artifact }}
        shell: bash

      - name: Generate Checksum
        run: |
          cd target/${{ matrix.target }}/release-final
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release-final/${{ matrix.artifact }}
            target/${{ matrix.target }}/release-final/${{ matrix.artifact }}.sha256
          retention-days: 1

  build-android:
    name: Build (Android)
    needs: check-version
    if: needs.check-version.outputs.created == 'true' && github.event.inputs.build_android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build APK (Release)
        run: |
          cd crates/sen-android/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          APK_PATH=$(find crates/sen-android/android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "sen-v${{ needs.check-version.outputs.version }}-android-unsigned.apk"
          else
            echo "No APK found!"
            exit 1
          fi
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: sen-v${{ needs.check-version.outputs.version }}-android-unsigned.apk
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: [check-version, build]
    if: needs.check-version.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_files
          pattern: '*' # Combined with merge-multiple: true, this grabs both 'binaries-*' and 'android-apk'
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          files: release_files/*
          generate_release_notes: true
          draft: false
          prerelease: false
          token: ${{ secrets.RELEASE_PAT }}
