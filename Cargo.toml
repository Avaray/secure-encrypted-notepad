[package]
name = "sed"
version = "3.0.0"
edition = "2021"
authors = ["Your Name"]
description = "Secure Encrypted Document editor with dual-factor auth and version control"

[dependencies]
# GUI Framework
eframe = "0.30"
egui = "0.30"

# Kryptografia
orion = "0.17"

# File dialogs
rfd = "0.15"

# SHA-256 hashing
sha2 = "0.10"

# Random number generation
rand = "0.8"

# Bezpieczne wyzerowywanie pamięci
zeroize = { version = "1.8", features = ["derive"] }

# Settings persistence
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
dirs = "5.0"

# Timestamps for version control
chrono = { version = "0.4", features = ["serde"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"