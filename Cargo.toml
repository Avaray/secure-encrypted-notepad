[package]
name = "sed"
version = "0.2.0"
edition = "2021"
authors = ["Dawid Wasowski"]
description = "Secure Encrypted Document editor with keyfile-only auth"

[dependencies]
# GUI Framework
eframe = "0.30"
egui = "0.30"
egui_extras = { version = "0.30", features = ["image"] }

# SVG support
resvg = "0.44"
usvg = "0.44"
tiny-skia = "0.11"

# Cryptography
orion = "0.17"

# File dialogs
rfd = "0.15"

# SHA-256 hashing
sha2 = "0.10"

# Random number generation
rand = "0.8"

# Secure memory zeroing
zeroize = { version = "1.8", features = ["derive"] }

# Settings persistence and theme system
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
dirs = "5.0"

# Timestamps for version control
chrono = { version = "0.4", features = ["serde"] }

# Base64 encoding for embedded history
base64 = "0.22"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"